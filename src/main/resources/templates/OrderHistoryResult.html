<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Order History Result</title></head>
<body>
<h1>Orders by <span th:text="${author}"></span></h1>
<table border="1">
    <tr>
        <th>Order ID</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.orderTime}"></td>
        <td th:text="${order.status}"></td>
        <td>
            <a th:href="@{/order/pay/{id}(id=${order.id})}">Pay</a>
        </td>
    </tr>
</table>
</body>
</html>
